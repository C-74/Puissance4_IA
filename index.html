<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puissance 4</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #1a1a2e;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 16px;
        }

        h1 { font-size: 2rem; }

        /* --- Indicateur de tour --- */
        #turn-indicator {
            padding: 8px 24px;
            border-radius: 20px;
            font-weight: bold;
            background: #dc2626;
        }
        #turn-indicator.player2 { background: #ca8a04; }

        /* --- Plateau --- */
        #game-board {
            background: #1d4ed8;
            padding: 16px;
            border-radius: 12px;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(7, 60px);
            gap: 8px;
        }

        /* --- Cellules --- */
        .cell {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            background: #0f172a;
            transition: background 0.2s;
        }
        .cell:hover:not(.red):not(.yellow) { background: #1e3a5f; }
        .cell.red    { background: #dc2626; animation: drop 0.35s ease-in; }
        .cell.yellow { background: #ca8a04; animation: drop 0.35s ease-in; }
        .cell.winning { outline: 3px solid white; }

        @keyframes drop {
            from { transform: translateY(-300px); opacity: 0; }
            to   { transform: translateY(0);      opacity: 1; }
        }

        /* --- Controles --- */
        .controls { display: flex; gap: 12px; }
        button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            background: #374151;
            color: white;
        }
        button:hover { background: #4b5563; }

        /* --- Scores --- */
        #scores { display: flex; gap: 40px; }
        .score-box { text-align: center; }
        .score-box span { font-size: 1.8rem; font-weight: bold; }

        /* --- Modal fin de partie --- */
        #game-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            align-items: center;
            justify-content: center;
        }
        #game-modal.visible { display: flex; }
        .modal-content {
            background: #1f2937;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .modal-content h2 { font-size: 1.8rem; }
    </style>
</head>
<body>

    <h1>Puissance 4</h1>

    <div id="turn-indicator">Tour du Joueur 1</div>

    <div id="game-board">
        <div id="board"></div>
    </div>

    <div class="controls">
        <button onclick="resetGame()">Nouvelle partie</button>
        <button onclick="undoMove()">Annuler</button>
    </div>

    <div id="scores">
        <div class="score-box">
            <div>Joueur 1</div>
            <span id="player-score">0</span>
        </div>
        <div class="score-box">
            <div>Egalites</div>
            <span id="draw-score">0</span>
        </div>
        <div class="score-box">
            <div>Joueur 2 / IA</div>
            <span id="ai-score">0</span>
        </div>
    </div>

    <!-- Modal fin de partie -->
    <div id="game-modal">
        <div class="modal-content">
            <h2 id="modal-title">Partie terminee !</h2>
            <p id="modal-message"></p>
            <button onclick="closeModalAndReset()">Rejouer</button>
        </div>
    </div>

    <script src="jeu.js"></script>
</body>
</html>
